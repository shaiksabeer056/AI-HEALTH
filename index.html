<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Health Predictor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI Health Predictor</h1>
            <p>Enter your health data for instant AI-powered risk assessment</p>
        </header>

        <form id="healthForm" class="form-section">
            <div class="input-group">
                <label>Age: <span id="ageVal">30</span></label>
                <input type="range" id="age" min="18" max="100" value="30">
            </div>
            <div class="input-group">
                <label>Gender:</label>
                <select id="gender">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>
            <div class="input-group bmi-group">
                <label>BMI: <span id="bmiVal">22</span></label>
                <input type="number" id="height" placeholder="Height (cm)" min="100" max="250">
                <input type="number" id="weight" placeholder="Weight (kg)" min="30" max="300" step="0.1">
                <button type="button" id="calcBMI">Calculate BMI</button>
            </div>
            <div class="input-group">
                <label>Blood Pressure (systolic): <span id="bpVal">120</span></label>
                <input type="range" id="bp" min="80" max="200" value="120">
            </div>
            <div class="input-group">
                <label>Cholesterol (mg/dL): <span id="cholVal">180</span></label>
                <input type="range" id="cholesterol" min="100" max="400" value="180">
            </div>
            <div class="input-group">
                <label>Symptoms (select all that apply):</label>
                <label><input type="checkbox" name="symptoms" value="fatigue"> Fatigue</label>
                <label><input type="checkbox" name="symptoms" value="chest_pain"> Chest Pain</label>
                <label><input type="checkbox" name="symptoms" value="short_breath"> Shortness of Breath</label>
                <label><input type="checkbox" name="symptoms" value="frequent_urination"> Frequent Urination</label>
                <label><input type="checkbox" name="symptoms" value="headache"> Headache</label>
            </div>
            <button type="submit" class="predict-btn">🚀 Predict My Health</button>
        </form>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>AI Analyzing...</p>
        </div>

        <div id="results" class="results hidden">
            <h2>Your Health Score: <span id="healthScore">0</span>/100</h2>
            <div class="risks">
                <h3>Predicted Risks:</h3>
                <ul id="riskList"></ul>
            </div>
            <div class="advice">
                <h3>Recommendations:</h3>
                <p id="adviceText"></p>
            </div>
            <canvas id="riskChart" width="400" height="200"></canvas>
            <canvas id="metricsChart" width="400" height="200"></canvas>
            <button id="newPrediction" class="new-btn">New Prediction</button>
        </div>

        <div id="history" class="history">
            <h3>Previous Predictions</h3>
            <ul id="historyList"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
